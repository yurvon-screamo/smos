# SMOS configuration for the BEAM long-term-memory benchmark.
#
# This is a SEPARATE database from the user's main SMOS store: [surreal].path
# points at ~/.smos/beam-rocksdb so the benchmark never contends with (or
# corrupts) the production memory. Retrieval is tuned wide (top_k_initial=300,
# top_k_final=200, min_confidence=0.0) so the benchmark scores SMOS' recall at
# the cutoffs the BEAM rubric probes (top-5/10/20/50), not an arbitrary
# pre-filter.
#
# The benchmark does NOT use `smos serve` (no proxy, no watcher). The operator
# starts the embedding / reranker / extraction llama-server endpoints by hand
# (or via `smos init --no-launch` + the model GGUFs already in ~/.smos/models),
# then `smos import raw` / `smos finalize` / `smos search` each connect to the
# RocksDB store for one operation and release the single-writer lock on exit.
# Strictly sequential — see benchmarks/README.md.

[surreal]
# Separate RocksDB path — NEVER collides with the user's main ~/.smos/db.
path = "~/.smos/beam-rocksdb/beam.db"
namespace = "beam"
database = "beam"

[server]
host = "127.0.0.1"
port = 8888
shutdown_extraction_grace_seconds = 30
enable_response_extraction = true
graceful_degradation = true
log_format = "json"

# `[[providers]]` is required by SmosConfig validation for EVERY command
# (including the read-only `search` the benchmark uses). The benchmark never
# routes chat through SMOS, so a placeholder entry satisfies validation.
[[providers]]
name = "bench-placeholder"
url = "http://localhost:28082/v1/chat/completions"
api_key_env = ""

# Fact-extraction LLM (Nemotron-3-Nano-4B). Same endpoint as the main config.
[llm_extraction]
url = "http://localhost:28082"
model = "nemotron-3-nano-4b"
api_key = ""
timeout_seconds = 180
temperature = 0.0
seed = 42

# Embedding model (Jina v5) — MUST match the HNSW index dimensionality.
[embedding]
url = "http://localhost:28081"
model = "hf.co/jinaai/jina-embeddings-v5-text-small-retrieval-GGUF:latest"
dimensions = 1024
api_key = ""
timeout_seconds = 120

# Reranker (Qwen3-Reranker). search is fail-closed without a reachable reranker.
[reranker]
url = "http://localhost:28181"
model = "qwen3-reranker"
timeout_seconds = 120

# WIDE retrieval — the benchmark's whole point is measuring recall at fixed
# cutoffs, so the candidate pool is large and the pre-filter confidence floor
# is 0.0 (let the reranker rank, do not pre-discard low-confidence facts).
[retrieval]
top_k_initial = 300
top_k_final = 200
min_confidence = 0.0
min_topic_chars = 3

[merge]
cosine_threshold = 0.85

[confidence]
base = 0.5
multi_source_bonus = 0.2
no_contradiction_bonus = 0.1
accept_threshold = 0.7
pending_threshold = 0.4

[nli]
contradiction_threshold = 0.5
entailment_threshold = 0.6

[nli_backend]
model = "MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli"
device = "auto"

[extraction]
dedup_cosine_threshold = 0.95

[heat]
decay_rate = 0.03
min_threshold = 0.2

[session]
timeout_seconds = 1800
pending_overflow_threshold = 20
scan_interval_seconds = 60

[audit]
enabled = false

[llama_cpp]
binary = "llama-server"
# The benchmark drives smos via CLI subprocesses, never `smos serve`, so
# auto-launch is off — start the three llama-server endpoints yourself.
auto_launch = false
idle_timeout_seconds = 300

[git]
repo_url = ""
branch = "main"
auto_push = false
local_path = "~/.smos/git/memory"
disable_gpg_sign = true
