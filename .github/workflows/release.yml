name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure cross-compile target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin smos --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../smos-${{ matrix.target }}-${{ github.ref_name }}.zip smos.exe
          cd ../../..

      - name: Package (Unix)
        if: matrix.archive != 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../smos-${{ matrix.target }}-${{ github.ref_name }}.tar.gz smos
          cd ../../..

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            smos-${{ matrix.target }}-${{ github.ref_name }}.zip
            smos-${{ matrix.target }}-${{ github.ref_name }}.tar.gz

  publish-npm:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cargo:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish smos-domain
        run: cargo publish -p smos-domain
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish smos-application
        run: cargo publish -p smos-application
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish smos-adapters
        run: cargo publish -p smos-adapters
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
